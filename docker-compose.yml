services:
  verna-mcp-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: verna-weather-gateway
    ports:
      - "8000:8000"
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - LOG_LEVEL=info
      - DEBUG=false
      - OWM_API_KEY=${OWM_API_KEY}
      - MCP_API_KEY=${MCP_API_KEY}
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
